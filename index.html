<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キッチン計量換算ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:14px;background:#f8fafc;color:#1e293b;min-height:100vh}
.outer{max-width:860px;margin:0 auto;padding:24px 16px 60px}
h1{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:20px;letter-spacing:.02em}

.tabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:1.5rem}
.tab{padding:10px 24px;font-size:14px;color:#94a3b8;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s;font-family:inherit}
.tab.active{color:#1e293b;border-bottom-color:#1e293b;font-weight:700}
.tab:hover:not(.active){color:#475569}
.panel{display:none}.panel.active{display:block}

/* search */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;height:46px;font-size:16px;padding:0 42px 0 14px;border:2px solid #bfdbfe;border-radius:12px;background:#fff;color:#1e293b;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px #bfdbfe55}
.search-clear{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#94a3b8;display:none;padding:0;line-height:1}
.search-clear:hover{color:#475569}
.dd{position:absolute;top:48px;left:0;right:0;background:#fff;border:2px solid #bfdbfe;border-radius:10px;z-index:100;max-height:240px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.dd.show{display:block}
.dd-item{padding:10px 14px;font-size:14px;cursor:pointer;color:#1e293b;border-bottom:1px solid #f1f5f9}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:#eff6ff}
.dd-cat{font-size:11px;color:#94a3b8;margin-left:8px}

.sec-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-pill{height:32px;padding:0 14px;font-size:13px;border-radius:99px;border:2px solid;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;font-weight:600;font-family:inherit;transition:filter .12s}
.cat-pill:active{filter:brightness(.82)}

.tile-outer{border:2px solid #bbf7d0;border-radius:10px;max-height:138px;overflow-y:auto;padding:10px;margin-bottom:16px;background:#f0fdf4}
.tile-grid{display:flex;flex-wrap:wrap;gap:6px}
.tile{height:30px;padding:0 12px;font-size:13px;border-radius:6px;border:2px solid;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;font-weight:500;font-family:inherit;transition:filter .12s}
.tile:active{filter:brightness(.82)}

/* conv */
.conv-grid{display:grid;grid-template-columns:1fr 50px 1fr;gap:10px;align-items:center;margin-bottom:6px}
.cbox{background:#fff;border:2px solid #bfdbfe;border-radius:12px;padding:16px}
.cbox-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:700}
.frac-input{width:100%;height:46px;font-size:24px;font-weight:700;padding:0 10px;border:2px solid #bfdbfe;border-radius:8px;background:#eff6ff;color:#1e293b;outline:none;font-family:inherit}
.frac-input:focus{border-color:#3b82f6;background:#e0ecff}
.frac-input.err{border-color:#f87171;background:#fff1f2;color:#dc2626}
.frac-hint{font-size:11px;color:#64748b;margin-top:4px;min-height:16px}
.cbox-num{width:100%;height:46px;font-size:24px;font-weight:700;padding:0 10px;border:2px solid #86efac;border-radius:8px;background:#f0fdf4;color:#16a34a;display:flex;align-items:center}
.cbox select{width:100%;height:38px;font-size:14px;padding:0 8px;border:2px solid #bfdbfe;border-radius:8px;background:#fff;color:#1e293b;margin-top:8px;cursor:pointer;font-family:inherit}
.swap-btn{width:50px;height:50px;border:2px solid #bfdbfe;border-radius:10px;background:#eff6ff;cursor:pointer;font-size:20px;color:#3b82f6;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0;font-family:inherit}
.swap-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
.ref-info{font-size:12px;color:#64748b;margin-top:8px;min-height:18px;line-height:1.9;padding:0 2px}
.ref-info b{color:#2563eb;font-weight:700}

/* recipe */
.dish-input{width:100%;height:42px;font-size:15px;padding:0 12px;border:2px solid #bfdbfe;border-radius:8px;background:#fff;color:#1e293b;outline:none;font-family:inherit;margin-bottom:14px}
.dish-input:focus{border-color:#3b82f6}
.mult-area{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.mult-wrap{display:flex;flex-direction:column;gap:4px}
.mult-input{width:130px;height:42px;font-size:22px;font-weight:700;text-align:center;padding:0 10px;border:2px solid #bfdbfe;border-radius:8px;background:#eff6ff;color:#2563eb;outline:none;font-family:inherit}
.mult-input:focus{border-color:#3b82f6;background:#e0ecff}
.mult-input.err{border-color:#f87171;background:#fff1f2;color:#dc2626}
.mult-label{font-size:14px;color:#475569;white-space:nowrap;font-weight:600;align-self:center;padding-top:2px}
.action-row{display:flex;gap:8px;justify-content:flex-end;margin-bottom:12px}
.action-btn{height:36px;padding:0 20px;font-size:13px;border-radius:8px;border:2px solid;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-family:inherit;transition:filter .12s}
.action-btn:active{filter:brightness(.85)}
.btn-save{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.btn-save:hover{background:#3b82f6;color:#fff}
.btn-copy{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.btn-copy:hover{background:#16a34a;color:#fff}
.btn-reset{border-color:#d1d5db;background:#f8fafc;color:#6b7280}
.btn-reset:hover{border-color:#ef4444;background:#fef2f2;color:#dc2626}

.rtable{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:2px solid #e2e8f0}
.rtable th{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;padding:8px 8px;text-align:left;border-bottom:2px solid #e2e8f0;font-weight:700;background:#f8fafc}
.rtable td{padding:3px 4px;border-bottom:1px solid #f1f5f9}
.rtable tr:last-child td{border-bottom:none}
.rtable input[type=text],.rtable input[type=number]{width:100%;height:30px;font-size:13px;padding:0 7px;border:1.5px solid #e2e8f0;border-radius:6px;background:#fff;color:#1e293b;outline:none;font-family:inherit}
.rtable input:focus{border-color:#3b82f6}
.rtable select{width:100%;height:30px;font-size:13px;padding:0 4px;border:1.5px solid #e2e8f0;border-radius:6px;background:#fff;color:#1e293b;font-family:inherit}
.rres{font-size:13px;font-weight:700;padding:3px 8px;color:#15803d;white-space:nowrap}
.rnum{font-size:11px;color:#cbd5e1;text-align:center;width:22px;padding:0 2px}

.saved-sec{margin-top:20px;border-top:2px solid #e2e8f0;padding-top:14px}
.saved-title{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:700}
.saved-list{display:flex;flex-wrap:wrap;gap:6px}
.saved-chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 10px 0 14px;border:2px solid #bfdbfe;border-radius:99px;background:#eff6ff;font-size:13px;color:#2563eb;cursor:pointer;font-weight:600;font-family:inherit}
.saved-chip:hover{background:#dbeafe}
.del-x{background:none;border:none;cursor:pointer;font-size:14px;color:#94a3b8;padding:0;line-height:1;display:inline-flex;align-items:center;font-family:inherit}
.del-x:hover{color:#dc2626}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

@media(max-width:600px){
  .conv-grid{grid-template-columns:1fr 40px 1fr;gap:6px}
  .swap-btn{width:40px;height:40px;font-size:16px}
  .cat-pill{height:28px;padding:0 10px;font-size:12px}
}
</style>
</head>
<body>
<div class="outer">
  <h1>キッチン計量換算ツール</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('conv')">単位換算</button>
    <button class="tab" onclick="switchTab('recipe')">倍量計算</button>
  </div>

  <!-- 換算タブ -->
  <div id="tab-conv" class="panel active">
    <div class="search-wrap">
      <input type="text" id="si" placeholder="材料名で検索（例: 醤油、みそ、薄力粉…）" oninput="onSearch()" onfocus="showDd()" onblur="hideDd()" autocomplete="off">
      <button class="search-clear" id="sc-btn" onclick="clearSearch()">✕</button>
      <div class="dd" id="dd"></div>
    </div>
    <div class="sec-label">カテゴリ</div>
    <div class="cat-row" id="cat-row"></div>
    <div class="sec-label">材料</div>
    <div class="tile-outer"><div class="tile-grid" id="tile-grid"></div></div>
    <div class="conv-grid">
      <div class="cbox">
        <div class="cbox-label">変換前</div>
        <input class="frac-input" type="text" id="amt-in" placeholder="例: 1と1/2" oninput="doConvert()" autocomplete="off">
        <div class="frac-hint" id="amt-hint"></div>
        <select id="unit-from" onchange="doConvert()"></select>
      </div>
      <button class="swap-btn" onclick="swapUnits()">⇄</button>
      <div class="cbox">
        <div class="cbox-label">変換後</div>
        <div class="cbox-num" id="result-num">—</div>
        <select id="unit-to" onchange="doConvert()"></select>
      </div>
    </div>
    <div class="ref-info" id="ref-info"></div>
  </div>

  <!-- 倍量タブ -->
  <div id="tab-recipe" class="panel">
    <input class="dish-input" type="text" id="dish-name" placeholder="料理名（任意）">
    <div class="mult-area">
      <div class="mult-wrap">
        <input class="mult-input" type="text" id="mult-val" placeholder="例：2" oninput="calcR()" autocomplete="off">
        <div class="frac-hint" id="mult-hint"></div>
      </div>
      <span class="mult-label">倍量に計算</span>
    </div>
    <div class="action-row">
      <button class="action-btn btn-save" onclick="saveRecipe()">保存</button>
      <button class="action-btn btn-copy" onclick="copyRecipe()">コピー</button>
      <button class="action-btn btn-reset" onclick="clearRecipe()">リセット</button>
    </div>
    <div style="overflow-x:auto">
      <table class="rtable">
        <thead><tr>
          <th style="width:22px">#</th>
          <th>材料名</th>
          <th style="width:100px">元の分量</th>
          <th style="width:72px">単位</th>
          <th style="width:90px">計算結果</th>
        </tr></thead>
        <tbody id="rbody"></tbody>
      </table>
    </div>
    <div class="saved-sec">
      <div class="saved-title">保存済みレシピ</div>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 分数パーサー ──────────────────────────
function parseFrac(s){
  s=s.trim();
  if(!s)return null;
  if(/^-?\d+(\.\d+)?$/.test(s)){const v=parseFloat(s);return isNaN(v)?null:{val:v,display:''};}
  const fo=s.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(fo){const n=parseInt(fo[1]),d=parseInt(fo[2]);if(d===0)return null;return{val:n/d,display:`= ${fmtN(n/d)}`};}
  const mx=s.match(/^(\d+)\s*(?:と|and|\s)\s*(\d+)\s*\/\s*(\d+)$/);
  if(mx){const w=parseInt(mx[1]),n=parseInt(mx[2]),d=parseInt(mx[3]);if(d===0)return null;const v=w+n/d;return{val:v,display:`= ${fmtN(v)}`};}
  return null;
}
function fmtN(n){if(Math.abs(n-Math.round(n))<0.0005)return Math.round(n).toString();return n.toFixed(3).replace(/\.?0+$/,'');}
function fmt(n){if(n===null||isNaN(n))return'—';if(Math.abs(n-Math.round(n))<0.005)return Math.round(n).toString();return n.toFixed(2).replace(/\.?0+$/,'');}

  {name:'豆板醤',kana:'とうばんじゃん',alias:'トウバンジャン',cat:'半液体調味料',tsp:7,tbsp:21,cup:null},
  {name:'甜麺醤',kana:'てんめんじゃん',alias:'テンメンジャン',cat:'半液体調味料',tsp:7,tbsp:21,cup:null},
  {name:'コチュジャン',kana:'こちゅじゃん',alias:'',cat:'半液体調味料',tsp:7,tbsp:21,cup:null},
  {name:'ごま',kana:'ごま',alias:'胡麻 白ごま 黒ごま',cat:'食材',tsp:3,tbsp:9,cup:120},
  {name:'すりごま',kana:'すりごま',alias:'摺り胡麻',cat:'食材',tsp:2,tbsp:6,cup:null},
  {name:'いりごま',kana:'いりごま',alias:'炒り胡麻',cat:'食材',tsp:2,tbsp:6,cup:null},
  {name:'カレー粉',kana:'かれーこ',alias:'カレーパウダー',cat:'食材',tsp:2,tbsp:6,cup:80},
  {name:'こしょう',kana:'こしょう',alias:'胡椒 黒胡椒 白胡椒',cat:'食材',tsp:2,tbsp:6,cup:100},
  {name:'わさび粉',kana:'わさびこ',alias:'山葵粉',cat:'食材',tsp:2,tbsp:6,cup:70},
  {name:'からし粉',kana:'からしこ',alias:'辛子粉 芥子粉',cat:'食材',tsp:2,tbsp:6,cup:90},
  {name:'うま味調味料',kana:'うまみちょうみりょう',alias:'味の素',cat:'食材',tsp:4,tbsp:12,cup:160},
  {name:'顆粒だしの素',kana:'かりゅうだしのもと',alias:'だしの素 出汁',cat:'食材',tsp:3,tbsp:9,cup:null},
  {name:'抹茶',kana:'まっちゃ',alias:'',cat:'食材',tsp:2,tbsp:6,cup:110},
  {name:'牛乳',kana:'ぎゅうにゅう',alias:'',cat:'乳製品',tsp:5,tbsp:15,cup:210},
  {name:'生クリーム',kana:'なまくりーむ',alias:'',cat:'乳製品',tsp:5,tbsp:15,cup:200},
  {name:'ヨーグルト',kana:'よーぐると',alias:'',cat:'乳製品',tsp:5,tbsp:15,cup:210},
];

const CAT_ORDER=['すべて','液体調味料','塩・砂糖','粉類','油脂類','半液体調味料','食材','乳製品'];
const CAT_COLORS={
  'すべて':      ['#f1f5f9','#94a3b8','#475569','#475569','#475569','#fff'],
  '液体調味料':  ['#eff6ff','#93c5fd','#2563eb','#2563eb','#2563eb','#fff'],
  '塩・砂糖':   ['#fffbeb','#fcd34d','#b45309','#b45309','#b45309','#fff'],
  '粉類':        ['#fff7ed','#fdba74','#c2410c','#c2410c','#c2410c','#fff'],
  '油脂類':      ['#fefce8','#fde047','#a16207','#a16207','#a16207','#fff'],
  '半液体調味料':['#f0fdfa','#5eead4','#0f766e','#0f766e','#0f766e','#fff'],
  '食材':        ['#f0fdf4','#86efac','#15803d','#15803d','#15803d','#fff'],
  '乳製品':      ['#fdf4ff','#e879f9','#86198f','#86198f','#86198f','#fff'],
};
const TILE_DEF=['#fff','#86efac','#166534','#15803d','#15803d','#fff'];
const UNITS=[{id:'tsp',label:'小さじ'},{id:'tbsp',label:'大さじ'},{id:'cup',label:'カップ'},{id:'cc',label:'cc / ml'},{id:'g',label:'g'}];

let selIng=null,selCat='すべて';

function applyPill(el,cat,sel){
  const c=CAT_COLORS[cat]||CAT_COLORS['すべて'];
  el.style.background=sel?c[3]:c[0];el.style.borderColor=sel?c[4]:c[1];el.style.color=sel?c[5]:c[2];
}
function applyTile(el,sel){
  const c=TILE_DEF;
  el.style.background=sel?c[3]:c[0];el.style.borderColor=sel?c[4]:c[1];el.style.color=sel?c[5]:c[2];
}
function hit(ing,q){return ing.name.includes(q)||ing.kana.includes(q.toLowerCase())||ing.alias.includes(q);}
function getUL(id){return UNITS.find(u=>u.id===id).label;}

function init(){
  const cr=document.getElementById('cat-row');
  CAT_ORDER.forEach(cat=>{
    const b=document.createElement('button');b.className='cat-pill';b.textContent=cat;
    applyPill(b,cat,cat==='すべて');
    b.onmouseover=()=>{if(selCat!==cat)b.style.filter='brightness(.9)';};
    b.onmouseout=()=>{b.style.filter='';applyPill(b,cat,selCat===cat);};
    b.onclick=()=>selCatFn(cat);cr.appendChild(b);
  });
  renderTiles('すべて');
  ['unit-from','unit-to'].forEach(id=>{
    const s=document.getElementById(id);
    UNITS.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=u.label;s.appendChild(o);});
  });
  document.getElementById('unit-from').value='tbsp';
  document.getElementById('unit-to').value='g';
  const tb=document.getElementById('rbody');
  for(let i=0;i<15;i++){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="rnum">${i+1}</td><td><input type="text" class="rname" placeholder="材料名"></td><td><input type="number" min="0" step="any" class="ramt" oninput="calcR()"></td><td><select class="runit" onchange="calcR()">${UNITS.map(u=>`<option value="${u.id}">${u.label}</option>`).join('')}</select></td><td class="rres">—</td>`;
    tb.appendChild(tr);
  }
  document.querySelectorAll('.runit').forEach(s=>s.value='g');
  renderSaved();
}

function selCatFn(cat){
  selCat=cat;
  document.querySelectorAll('.cat-pill').forEach(b=>{b.style.filter='';applyPill(b,b.textContent,b.textContent===cat);});
  renderTiles(cat);
}
function renderTiles(cat){
  const g=document.getElementById('tile-grid');g.innerHTML='';
  (cat==='すべて'?ING:ING.filter(i=>i.cat===cat)).forEach(ing=>{
    const b=document.createElement('button');b.className='tile';b.textContent=ing.name;
    applyTile(b,selIng===ing);
    b.onmouseover=()=>{if(selIng!==ing){b.style.background='#dcfce7';b.style.borderColor='#16a34a';}};
    b.onmouseout=()=>{applyTile(b,selIng===ing);};
    b.onclick=()=>pickIng(ing);g.appendChild(b);
  });
}
function pickIng(ing){
  selIng=ing;
  document.querySelectorAll('.tile').forEach(b=>applyTile(b,b.textContent===ing.name));
  doConvert();
}

function doConvert(){
  const raw=document.getElementById('amt-in').value;
  const inp=document.getElementById('amt-in');
  const hint=document.getElementById('amt-hint');
  const rn=document.getElementById('result-num');
  const ri=document.getElementById('ref-info');
  if(selIng){
    const cup=selIng.cup!==null?selIng.cup+'g':'—';
    ri.innerHTML=`<b>${selIng.name}</b>&nbsp;|&nbsp;比重 ${(selIng.tsp/5).toFixed(2)}&nbsp;|&nbsp;小さじ1 = ${selIng.tsp}g&nbsp;|&nbsp;大さじ1 = ${selIng.tbsp}g&nbsp;|&nbsp;1カップ = ${cup}`;
  } else {ri.innerHTML='';}
  if(!raw.trim()){inp.classList.remove('err');hint.textContent='';rn.textContent='—';return;}
  const parsed=parseFrac(raw);
  if(!parsed){inp.classList.add('err');hint.textContent='形式例: 1/2 ・ 1と1/2 ・ 2';rn.textContent='—';return;}
  inp.classList.remove('err');hint.textContent=parsed.display||'';
  const amount=parsed.val;
  if(amount<0){rn.textContent='—';return;}
  const uf=document.getElementById('unit-from').value;
  const ut=document.getElementById('unit-to').value;
  const volMap={tsp:5,tbsp:15,cup:200,cc:1};
  const isVF=['tsp','tbsp','cup','cc'].includes(uf),isVT=['tsp','tbsp','cup','cc'].includes(ut);
  if(uf===ut){rn.textContent=fmt(amount)+' '+getUL(ut);return;}
  if(isVF&&isVT){rn.textContent=fmt(amount*volMap[uf]/volMap[ut])+' '+getUL(ut);return;}
  if(!selIng){rn.textContent='材料を選択';return;}
  if(isVF&&ut==='g'){const g=uf==='cc'?amount*(selIng.tsp/5):amount*selIng[uf];rn.textContent=(g===null)?'データなし':fmt(g)+' g';return;}
  if(uf==='g'&&isVT){if(ut==='cc'){rn.textContent=fmt(amount/(selIng.tsp/5))+' cc';}else{const gU=selIng[ut];rn.textContent=gU===null?'データなし':fmt(amount/gU)+' '+getUL(ut);}}
}

function swapUnits(){
  const uf=document.getElementById('unit-from'),ut=document.getElementById('unit-to');
  const t=uf.value;uf.value=ut.value;ut.value=t;doConvert();
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['conv','recipe'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

function calcR(){
  const raw=document.getElementById('mult-val').value;
  const inp=document.getElementById('mult-val');
  const hint=document.getElementById('mult-hint');
  if(!raw.trim()){inp.classList.remove('err');hint.textContent='';resetRres();return;}
  const parsed=parseFrac(raw);
  if(!parsed||parsed.val<=0){inp.classList.add('err');hint.textContent='形式例: 2 ・ 1/2 ・ 1と1/2';resetRres();return;}
  inp.classList.remove('err');hint.textContent=parsed.display||'';
  const m=parsed.val;
  document.querySelectorAll('#rbody tr').forEach(tr=>{
    const a=parseFloat(tr.querySelector('.ramt').value),u=tr.querySelector('.runit').value,c=tr.querySelector('.rres');
    c.textContent=(isNaN(a)||a===0)?'—':fmt(a*m)+' '+UNITS.find(x=>x.id===u).label;
  });
}
function resetRres(){document.querySelectorAll('#rbody .rres').forEach(c=>c.textContent='—');}

function clearRecipe(){
  document.querySelectorAll('#rbody tr').forEach(tr=>{tr.querySelector('.rname').value='';tr.querySelector('.ramt').value='';tr.querySelector('.runit').value='g';tr.querySelector('.rres').textContent='—';});
  document.getElementById('dish-name').value='';
  const mv=document.getElementById('mult-val');mv.value='';mv.classList.remove('err');
  document.getElementById('mult-hint').textContent='';
}
function copyRecipe(){
  const lines=[];
  document.querySelectorAll('#rbody tr').forEach(tr=>{const n=tr.querySelector('.rname').value.trim(),r=tr.querySelector('.rres').textContent;if(n||r!=='—')lines.push(`${n||'(材料名なし)'}\t${r}`);});
  if(!lines.length){showToast('コピーするデータがありません');return;}
  const d=document.getElementById('dish-name').value.trim();
  navigator.clipboard.writeText((d?d+'\n':'')+lines.join('\n')).then(()=>showToast('コピーしました')).catch(()=>showToast('コピーに失敗しました'));
}
function getSaved(){try{return JSON.parse(localStorage.getItem('kitchen_tool_v1')||'[]');}catch{return[];}}
function setSaved(d){try{localStorage.setItem('kitchen_tool_v1',JSON.stringify(d));}catch{}}
function renderSaved(){
  const el=document.getElementById('saved-list');el.innerHTML='';
  const data=getSaved();
  if(!data.length){el.innerHTML='<span style="font-size:13px;color:#94a3b8">保存されたレシピはありません</span>';return;}
  data.forEach((r,i)=>{const c=document.createElement('div');c.className='saved-chip';c.innerHTML=`<span onclick="loadR(${i})">${r.name||'(名前なし)'}</span><button class="del-x" onclick="delR(${i})">✕</button>`;el.appendChild(c);});
}
function saveRecipe(){
  const rows=[];document.querySelectorAll('#rbody tr').forEach(tr=>{rows.push({n:tr.querySelector('.rname').value,a:tr.querySelector('.ramt').value,u:tr.querySelector('.runit').value});});
  const name=document.getElementById('dish-name').value.trim()||'(名前なし)';
  const d=getSaved();d.push({name,rows});setSaved(d);renderSaved();showToast(`「${name}」を保存しました`);
}
function loadR(i){
  const r=getSaved()[i];if(!r)return;
  document.getElementById('dish-name').value=r.name==='(名前なし)'?'':r.name;
  const trs=document.querySelectorAll('#rbody tr');
  r.rows.forEach((row,j)=>{if(j>=trs.length)return;trs[j].querySelector('.rname').value=row.n||'';trs[j].querySelector('.ramt').value=row.a||'';trs[j].querySelector('.runit').value=row.u||'g';});
  calcR();showToast(`「${r.name}」を読み込みました`);
}
function delR(i){const d=getSaved();d.splice(i,1);setSaved(d);renderSaved();showToast('削除しました');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

let ddT;
function onSearch(){
  const q=document.getElementById('si').value.trim();
  document.getElementById('sc-btn').style.display=q?'block':'none';
  clearTimeout(ddT);ddT=setTimeout(()=>{
    const dd=document.getElementById('dd');
    if(!q){dd.classList.remove('show');return;}
    const hits=ING.filter(i=>hit(i,q)).slice(0,10);
    dd.innerHTML=hits.map(i=>`<div class="dd-item" onmousedown="pickSearch('${i.name}')">${i.name}<span class="dd-cat">${i.cat}</span></div>`).join('');
    dd.classList.toggle('show',hits.length>0);
  },100);
}
function showDd(){const q=document.getElementById('si').value.trim();if(q)onSearch();}
function hideDd(){setTimeout(()=>document.getElementById('dd').classList.remove('show'),200);}
function pickSearch(name){
  const ing=ING.find(i=>i.name===name);
  document.getElementById('si').value=ing.name;document.getElementById('sc-btn').style.display='block';document.getElementById('dd').classList.remove('show');
  selCatFn(ing.cat);pickIng(ing);
}
function clearSearch(){document.getElementById('si').value='';document.getElementById('sc-btn').style.display='none';document.getElementById('dd').classList.remove('show');}

init();
</script>
